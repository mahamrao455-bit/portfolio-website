<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <h2 class="logo">NOVA STORE</h2>

  <input type="text" placeholder="Search products...">

  <div class="cart">
    🛒 <span id="cartCount">0</span>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Premium Online Store</h1>
  <p>International fashion & accessories</p>
</section>

<!-- PRODUCTS -->
<section class="products">

  <div class="product">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800">
    <h3>Shoes</h3>
    <p>$120</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://astore.pk/cdn/shop/files/2_af72ba10-005b-4bc5-ac03-c1250ad85bfb.jpg?v=1772266010&width=3840">
    <h3>Bag</h3>
    <p>$90</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800">
    <h3>Watch</h3>
    <p>$150</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800">
    <h3>Headphones</h3>
    <p>$110</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Nova Store</p>
</footer>

<script src="script.js"></script>
</body>
</html>
